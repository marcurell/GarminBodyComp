name: Deploy Infrastructure

on:
  push:
    branches: [master]
    paths:
      - 'infra/**'
  workflow_dispatch:

concurrency:
  group: azure-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy main Bicep
        uses: azure/arm-deploy@a1361c2781ef5767c606084053190b76f4b7b7c2  # v2.0.0
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >
            tokenEncryptionKey=${{ secrets.TOKEN_ENCRYPTION_KEY }}
            googleClientId=${{ secrets.GOOGLE_CLIENT_ID }}
            googleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }}
          failOnStdErr: false

      - name: Deploy API Bicep
        uses: azure/arm-deploy@a1361c2781ef5767c606084053190b76f4b7b7c2  # v2.0.0
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: infra/api.bicep
          parameters: >
            googleClientId=${{ secrets.GOOGLE_CLIENT_ID }}
            googleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }}
          failOnStdErr: false
