name: Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'api/**'
      - 'modules/**'
      - 'requirements.in'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile pinned requirements
        run: |
          pip install pip-tools
          pip-compile requirements.in --output-file requirements.txt --quiet

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Zip app for deployment
        run: |
          zip -r app.zip . \
            -x "*.git*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x "infra/*" \
            -x ".github/*" \
            -x "*.md"

      - name: Deploy API via Kudu (triggers Oryx server-side build)
        run: |
          az webapp deployment source config-zip \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_API_WEBAPP_NAME }} \
            --src app.zip
