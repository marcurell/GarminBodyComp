name: Deploy App

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: azure-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Azure login
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302  # v2.2.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Compile pinned requirements
        run: |
          pip install pip-tools
          pip-compile requirements.in --output-file requirements.txt --quiet

      - name: Zip app for deployment
        run: zip -r app.zip . -x "*.git*" -x "__pycache__/*" -x "*.pyc" -x "infra/*" -x ".github/*"

      - name: Deploy via Kudu (triggers Oryx server-side build)
        run: |
          az webapp deployment source config-zip \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --src app.zip
